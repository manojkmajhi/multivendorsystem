<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin CSS Test</title>
  <link rel="stylesheet" href="/css/admin-style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="admin-navbar">
    <div class="admin-navbar-container">
      <a href="/admin/" class="admin-brand">
        <span>Admin Test</span>
      </a>
      
      <!-- Desktop Navigation Links -->
      <div class="desktop-nav-links">
        <a href="#" class="nav-link active">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-link">
          <span class="nav-icon">📦</span>
          <span>Products</span>
        </a>
        <button type="button" class="nav-link nav-logout-btn">
          <span class="nav-icon">🚪</span>
          <span>Logout</span>
        </button>
      </div>
      
      <!-- Mobile Hamburger Menu -->
      <button class="mobile-menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Sidebar -->
  <div class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar-content">
      <div class="sidebar-header">
        <h3 class="sidebar-title">Admin Panel</h3>
        <button class="sidebar-close" onclick="toggleSidebar()" aria-label="Close menu">&times;</button>
      </div>
      
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active">
          <span class="sidebar-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="#" class="sidebar-link">
          <span class="sidebar-icon">📦</span>
          <span>Products</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <button type="button" class="sidebar-logout-btn">
          <span class="sidebar-icon">🚪</span>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="admin-container">
    <div class="page-header">
      <h1 class="page-title">Admin CSS Test</h1>
      <button class="btn btn-primary">Test Button</button>
    </div>

    <div class="alert alert-success">CSS is working correctly!</div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Products</div>
        <div class="stat-value">42</div>
      </div>
      <div class="stat-card success">
        <div class="stat-label">Orders</div>
        <div class="stat-value">128</div>
      </div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Test Card</h2>
      </div>
      <div class="card-body">
        <p>This is a test to verify that the admin CSS is loading and working properly.</p>
        
        <div class="form-group">
          <label class="form-label">Test Input</label>
          <input type="text" class="form-control" placeholder="Enter text here">
        </div>
        
        <div style="display: flex; gap: 0.5rem;">
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-success">Success</button>
          <button class="btn btn-warning">Warning</button>
          <button class="btn btn-danger">Danger</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/admin-enhancements.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('adminSidebar').classList.toggle('active');
    }
  </script>
</body>
</html>
